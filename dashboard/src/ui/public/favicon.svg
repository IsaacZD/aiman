<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5aa3ff"/>
      <stop offset="100%" stop-color="#3a7bff"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5aa3ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a7bff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded-square background -->
  <rect x="8" y="8" width="496" height="496" rx="96" fill="#0b0f18" stroke="#1a2440" stroke-width="6"/>

  <!-- Three interlocking diamond/rhombus shapes forming an abstract geometric mark -->

  <!-- Back shape (largest, faintest) -->
  <polygon points="256,80 400,256 256,432 112,256" fill="none" stroke="#5aa3ff" stroke-width="6" opacity="0.2"/>

  <!-- Middle shape (rotated, semi-transparent fill) -->
  <polygon points="256,120 376,256 256,392 136,256" fill="url(#g2)" stroke="none"/>

  <!-- Front shape (smallest, solid) -->
  <polygon points="256,168 344,256 256,344 168,256" fill="url(#g1)" stroke="none"/>

  <!-- Circuit node dots at vertices -->
  <circle cx="256" cy="120" r="10" fill="#5aa3ff" opacity="0.6"/>
  <circle cx="376" cy="256" r="10" fill="#5aa3ff" opacity="0.6"/>
  <circle cx="256" cy="392" r="10" fill="#5aa3ff" opacity="0.6"/>
  <circle cx="136" cy="256" r="10" fill="#5aa3ff" opacity="0.6"/>

  <!-- Inner connection lines radiating from center -->
  <line x1="256" y1="256" x2="256" y2="168" stroke="#f5f7fb" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="256" x2="344" y2="256" stroke="#f5f7fb" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="256" x2="256" y2="344" stroke="#f5f7fb" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="256" x2="168" y2="256" stroke="#f5f7fb" stroke-width="2" opacity="0.3"/>

  <!-- Center node -->
  <circle cx="256" cy="256" r="14" fill="#f5f7fb"/>
</svg>
